name: bda-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - pandas
  - pyarrow=14.0.2
  - matplotlib
  - astropy
  - dask
  - ipykernel

  - pyspark=3.5.0
  - findspark
  - openjdk=11
  
  - pytest
  - pytest-cov
  - pytest-mock

  - pip
  - pip:
    - kafka-python
    - msgpack